# Command Center — Model Configuration (Phase 3: 2026 Optimal)
# Approved providers: Ollama Local, Ollama Pro (cloud), NIM Direct, ChatGPT Pro (Codex), Perplexity Pro, Z.ai
# Anthropic API is NOT approved for OpenClaw harness use

defaults:
  strategy: hybrid
  execution_mode: simulate
  risk_mode: balanced
  parallel_cap: 6

# Hardware budget: 64GB unified, 45GB concurrent local max
# Cornelius exclusive: 51GB (all other local models unload)

providers:
  ollama_local:
    base_url: http://localhost:11434
    priority: 0  # always available, zero cost
  ollama_cloud:
    base_url: https://api.ollama.com/v1
    api_key_env: OLLAMA_API_KEY
    priority: 1  # Ollama Pro — 3 concurrent cloud slots
  nim:
    base_url: https://integrate.api.nvidia.com/v1
    api_key_env: NVIDIA_NIM_API_KEY
    priority: 1  # generous free tier
  perplexity:
    base_url: https://api.perplexity.ai
    api_key_env: PERPLEXITY_API_KEY
    priority: 1  # web-grounded research — Perplexity Pro
  zai:
    base_url: https://api.z.ai/v1
    api_key_env: ZAI_API_KEY
    priority: 2
  codex:
    base_url: https://api.openai.com/v1
    api_key_env: OPENAI_API_KEY
    priority: 3  # ChatGPT Pro — 5-20x rate limits, priority processing

# Local model roster (concurrent ~42GB):
#   nemotron-3-nano:4b    ~2.5GB  (always loaded — Milo fallback, Cortana)
#   gemma4:26b            ~16GB   (Pulse, Quant, Hemingway, Zuck, Hermes)
#   glm-4.7-flash         ~5GB    (Sentinel)
#   nomic-embed-text      ~0.3GB  (embeddings)

agents:
  # --- Command Layer ---
  Milo:
    bias: balanced
    preference: cloud-first
    primary_model: ollama_cloud/gemma4:31b-cloud
    escalation_model: nim/nvidia/llama-3.3-nemotron-super-49b-v1.5
    fallback_model: ollama_local/nemotron-3-nano:4b
    escalate_to_cloud_on:
      - complexity_gte_3
      - long_context

  Elon:
    bias: accuracy
    preference: cloud-preferred
    primary_model: codex/gpt-5.4
    escalation_model: nim/nvidia/llama-3.1-nemotron-ultra-253b-v1
    fallback_model: ollama_cloud/nemotron-3-super:cloud

  # --- Governance Layer ---
  Sentinel:
    bias: accuracy
    preference: hybrid
    primary_model: ollama_local/glm-4.7-flash
    escalation_model: zai/glm-5
    fallback_model: ollama_local/gemma4:26b
    cloud_on:
      - high_stakes
      - conflicting_outputs

  Cortana:
    bias: balanced
    preference: local-first
    primary_model: ollama_local/nemotron-3-nano:4b
    escalation_model: ollama_local/gemma4:26b

  Themis:
    bias: accuracy
    preference: cloud-preferred
    primary_model: codex/o4-mini
    escalation_model: codex/gpt-5.4
    fallback_model: zai/glm-5

  Cerberus:
    bias: accuracy
    preference: cloud-preferred
    primary_model: nim/nvidia/llama-3.1-nemotron-ultra-253b-v1
    escalation_model: codex/gpt-5.4
    fallback_model: zai/glm-5

  # --- Specialist Layer ---
  Pulse:
    bias: speed
    preference: local-first
    primary_model: ollama_local/gemma4:26b
    web_grounded_model: perplexity/sonar-pro
    escalation_model: nim/nvidia/llama-3.3-nemotron-super-49b-v1.5

  Sagan:
    bias: accuracy
    preference: cloud-preferred
    primary_model: perplexity/sonar-reasoning-pro
    escalation_model: codex/gpt-5.4
    fallback_model: zai/glm-5

  Quant:
    bias: accuracy
    preference: local-first
    primary_model: ollama_local/gemma4:26b
    escalation_model: codex/o4-mini
    fallback_model: nim/nvidia/llama-3.3-nemotron-super-49b-v1.5

  Neo:
    bias: accuracy
    preference: cloud-preferred
    primary_model: nim/qwen/qwen3-coder-480b-a35b-instruct
    escalation_model: codex/gpt-5.4
    fallback_model: ollama_cloud/qwen3-coder-next:cloud

  Cornelius:
    bias: balanced
    preference: local-exclusive
    primary_model: ollama_local/qwen3-coder-next:latest
    escalation_model: codex/gpt-5.4
    exclusive_local: true  # 51GB — runs solo, no concurrent local models

  Hemingway:
    bias: balanced
    preference: local-first
    primary_model: ollama_local/gemma4:26b
    escalation_model: zai/glm-5
    fallback_model: nim/nvidia/llama-3.3-nemotron-super-49b-v1.5

  Jonny:
    bias: balanced
    preference: cloud-preferred
    primary_model: zai/glm-5
    fallback_model: ollama_local/gemma4:26b

  Kairo:
    bias: accuracy
    preference: cloud-preferred
    primary_model: codex/gpt-5.4
    escalation_model: nim/qwen/qwen3-coder-480b-a35b-instruct
    fallback_model: ollama_cloud/qwen3-coder-next:cloud

  Zuck:
    bias: balanced
    preference: local-first
    primary_model: ollama_local/gemma4:26b
    escalation_model: nim/nvidia/llama-3.3-nemotron-super-49b-v1.5

  Hermes:
    bias: balanced
    preference: local-first
    primary_model: ollama_local/gemma4:26b
    escalation_model: zai/glm-5
    fallback_model: nim/nvidia/llama-3.3-nemotron-super-49b-v1.5
