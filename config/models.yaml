# Command Center — Model Configuration
# Approved providers: Ollama Local, Ollama Pro (cloud), NIM Direct, ChatGPT Plus (Codex), Perplexity Pro, Z.ai
# Anthropic API is NOT approved for OpenClaw harness use

defaults:
  strategy: hybrid
  execution_mode: simulate
  risk_mode: balanced
  parallel_cap: 6

providers:
  ollama_local:
    base_url: http://localhost:11434
    priority: 0  # always available, zero cost
  nim:
    base_url: https://integrate.api.nvidia.com/v1
    api_key_env: NVIDIA_NIM_API_KEY
    priority: 1  # preferred cloud — generous free tier
  perplexity:
    base_url: https://api.perplexity.ai
    api_key_env: PERPLEXITY_API_KEY
    priority: 1  # web-grounded research — Perplexity Pro
  zai:
    base_url: https://api.z.ai/v1
    api_key_env: ZAI_API_KEY
    priority: 2
  ollama_cloud:
    base_url: https://api.ollama.com/v1
    api_key_env: OLLAMA_API_KEY
    priority: 2
    concurrent_slots: 3  # Ollama Pro limit
    # Cloud models available: gpt-oss:120b, minimax-m2-7, gemma4:27b (overflow)
  codex:
    base_url: https://api.openai.com/v1
    api_key_env: OPENAI_API_KEY
    priority: 3  # reserve for architecture, heavy orchestration, precision coding

agents:
  # ── EXECUTIVE ASSISTANT ────────────────────────────────────────────────────────
  Milo:
    bias: balanced
    preference: local-first
    primary_model: ollama_local/nemotron-super-49b
    escalation_model: nim/nvidia/nemotron-3-super-120b-a12b
    fallback_model: ollama_cloud/nemotron-super-49b
    escalate_to_cloud_on:
      - complexity_gte_3
      - long_context

  # ── MASTER ORCHESTRATOR ────────────────────────────────────────────────────────
  Elon:
    bias: accuracy
    preference: cloud-preferred
    primary_model: nim/nvidia/nemotron-3-super-120b-a12b
    escalation_model: codex/gpt-5.4
    fallback_model: zai/glm-5
    supplementary_model: perplexity/sonar-pro  # current events context

  # ── GATE AGENTS ────────────────────────────────────────────────────────────────
  Sentinel:
    bias: accuracy
    preference: hybrid
    primary_model: ollama_local/glm-4.7-flash
    escalation_model: zai/glm-5
    cloud_on:
      - high_stakes
      - conflicting_outputs

  Themis:
    bias: accuracy
    preference: cloud-preferred
    primary_model: nim/nvidia/llama-3.1-nemotron-ultra-253b-v1
    escalation_model: codex/gpt-5.4
    fallback_model: zai/glm-5

  Cerberus:
    bias: accuracy
    preference: cloud-preferred
    primary_model: nim/nvidia/llama-3.1-nemotron-ultra-253b-v1
    escalation_model: codex/gpt-5.4
    fallback_model: zai/glm-5

  # ── STATE ENGINE ───────────────────────────────────────────────────────────────
  Cortana:
    bias: balanced
    preference: local-first
    primary_model: ollama_local/gemma4:27b

  # ── SENSOR ─────────────────────────────────────────────────────────────────────
  Pulse:
    bias: speed
    preference: local-first
    primary_model: ollama_local/gemma4:27b
    web_grounded_model: perplexity/sonar-pro  # Perplexity Pro — live signal scanning
    escalation_model: nim/nvidia/nemotron-3-super-120b-a12b

  # ── ANALYSTS ───────────────────────────────────────────────────────────────────
  Sagan:
    bias: accuracy
    preference: cloud-preferred
    primary_model: perplexity/sonar-reasoning-pro  # Perplexity Pro — deep research authority
    supplementary_model: zai/glm-5
    escalation_model: codex/gpt-5.4
    local_fallback: ollama_local/gemma4:27b

  Quant:
    bias: accuracy
    preference: local-first
    primary_model: ollama_local/gemma4:27b
    escalation_model: codex/o4-mini
    fallback_model: nim/nvidia/nemotron-3-super-120b-a12b

  # ── BUILDERS ───────────────────────────────────────────────────────────────────
  Neo:
    bias: accuracy
    preference: cloud-preferred
    primary_model: codex/gpt-5.4             # ChatGPT Plus — architecture and technical design
    escalation_model: nim/nvidia/nemotron-3-super-120b-a12b
    fallback_model: zai/glm-5
    local_fallback: ollama_local/gpt-oss:20b

  Cornelius:
    bias: balanced
    preference: local-first
    primary_model: ollama_local/gpt-oss:20b
    escalation_model: ollama_cloud/gpt-oss:120b  # Ollama Pro for heavy infra plans
    fallback_model: ollama_local/minimax-m2-7
    exclusive_local: false  # gpt-oss:20b fits within 45GB budget

  ClawCode:
    bias: accuracy
    preference: local-first
    primary_model: ollama_local/minimax-m2-7  # routine autonomous coding
    local_heavy: ollama_local/gpt-oss:20b
    cloud_heavy: ollama_cloud/gpt-oss:120b    # Ollama Pro for large codebases
    precision_model: codex/gpt-5.4            # ChatGPT Plus for precision/critical tasks
    note: "Routine autonomous coding via NEO/CORNELIUS delegation; Claude Code handles critical/complex"

  # ── PUBLISHERS ─────────────────────────────────────────────────────────────────
  Hemingway:
    bias: balanced
    preference: local-first
    primary_model: ollama_local/gemma4:27b
    escalation_model: zai/glm-5
    fallback_model: nim/nvidia/nemotron-3-super-120b-a12b
    supplementary_model: perplexity/sonar-pro  # optional: source verification

  Jonny:
    bias: balanced
    preference: cloud-preferred
    primary_model: zai/glm-5                  # visual strategy and prompt design
    fallback_model: ollama_local/gemma4:27b

  Zuck:
    bias: balanced
    preference: local-first
    primary_model: ollama_local/gemma4:27b
    escalation_model: nim/nvidia/nemotron-3-super-120b-a12b

  # ── COMMS ──────────────────────────────────────────────────────────────────────
  Kairo:
    bias: accuracy
    preference: local-first
    primary_model: ollama_local/gpt-oss:20b   # frontend coding
    escalation_model: codex/gpt-5.4
    fallback_model: ollama_local/minimax-m2-7

  Hermes:
    bias: balanced
    preference: local-first
    primary_model: ollama_local/gemma4:27b
    escalation_model: zai/glm-5
    fallback_model: nim/nvidia/nemotron-3-super-120b-a12b

