# Mission Control — Model Configuration
# Approved providers: Ollama Local, Ollama Pro (cloud), NIM Direct, ChatGPT Plus (Codex), Perplexity Pro, Z.ai
# Anthropic API is NOT approved for OpenClaw harness use

defaults:
  strategy: hybrid
  execution_mode: simulate
  risk_mode: balanced
  parallel_cap: 6

providers:
  ollama_local:
    base_url: http://localhost:11434
    priority: 0  # always available, zero cost
  nim:
    base_url: https://integrate.api.nvidia.com/v1
    api_key_env: NVIDIA_NIM_API_KEY
    priority: 1  # preferred cloud — generous free tier
  perplexity:
    base_url: https://api.perplexity.ai
    api_key_env: PERPLEXITY_API_KEY
    priority: 1  # web-grounded research
  zai:
    base_url: https://api.z.ai/v1
    api_key_env: ZAI_API_KEY
    priority: 2
  ollama_cloud:
    base_url: https://api.ollama.com/v1
    api_key_env: OLLAMA_API_KEY
    priority: 2
  codex:
    base_url: https://api.openai.com/v1
    api_key_env: OPENAI_API_KEY
    priority: 3  # reserve for heavy orchestration and coding

agents:
  Milo:
    bias: balanced
    preference: local-first
    primary_model: ollama_local/nemotron-super-49b
    escalation_model: nim/nvidia/nemotron-3-super-120b-a12b
    fallback_model: ollama_cloud/nemotron-super-49b
    escalate_to_cloud_on:
      - complexity_gte_3
      - long_context

  Elon:
    bias: accuracy
    preference: cloud-preferred
    primary_model: nim/nvidia/nemotron-3-super-120b-a12b
    escalation_model: codex/gpt-5.4
    fallback_model: zai/glm-5
    local_fallback: ollama_local/qwen3.5:32b

  Sentinel:
    bias: accuracy
    preference: hybrid
    primary_model: ollama_local/glm-4.7-flash
    escalation_model: zai/glm-5
    cloud_on:
      - high_stakes
      - conflicting_outputs

  Cortana:
    bias: balanced
    preference: local-first
    primary_model: ollama_local/qwen3.5:4b
    escalation_model: ollama_local/qwen3.5:9b

  Themis:
    bias: accuracy
    preference: cloud-preferred
    primary_model: nim/nvidia/llama-3.1-nemotron-ultra-253b-v1
    escalation_model: codex/gpt-5.4
    fallback_model: zai/glm-5

  Cerberus:
    bias: accuracy
    preference: cloud-preferred
    primary_model: nim/nvidia/llama-3.1-nemotron-ultra-253b-v1
    escalation_model: codex/gpt-5.4
    fallback_model: zai/glm-5

  Pulse:
    bias: speed
    preference: local-first
    primary_model: ollama_local/qwen3.5:9b
    web_grounded_model: perplexity/sonar-pro
    escalation_model: nim/nvidia/nemotron-3-super-120b-a12b

  Sagan:
    bias: accuracy
    preference: cloud-preferred
    primary_model: perplexity/sonar-reasoning-pro
    supplementary_model: zai/glm-5
    escalation_model: codex/gpt-5.4
    local_fallback: ollama_local/qwen3.5:32b

  Quant:
    bias: accuracy
    preference: local-first
    primary_model: ollama_local/qwen3.5:14b
    escalation_model: codex/o4-mini
    fallback_model: nim/nvidia/nemotron-3-super-120b-a12b

  Neo:
    bias: accuracy
    preference: cloud-preferred
    primary_model: nim/qwen/qwen3-coder-480b-a35b-instruct
    escalation_model: codex/gpt-5.3-codex
    fallback_model: zai/glm-5
    local_fallback: ollama_local/qwen3-coder-next

  Cornelius:
    bias: balanced
    preference: local-exclusive
    primary_model: ollama_local/qwen3-coder-next:latest
    escalation_model: codex/gpt-5.3-codex  # only if local is down
    escalate_bias_on_risk: accuracy
    exclusive_local: true  # 51GB — runs solo, no concurrent local models

  Hemingway:
    bias: balanced
    preference: local-first
    primary_model: ollama_local/qwen3:14b
    escalation_model: zai/glm-5
    fallback_model: nim/nvidia/nemotron-3-super-120b-a12b

  Jonny:
    bias: balanced
    preference: cloud-preferred
    primary_model: zai/glm-5
    fallback_model: ollama_local/qwen3:14b

  Kairo:
    bias: accuracy
    preference: local-first
    primary_model: ollama_local/qwen3-coder-next:latest
    escalation_model: nim/qwen/qwen3-coder-480b-a35b-instruct  # when Cornelius holds local
    fallback_model: codex/gpt-5.3-codex
    note: "When CORNELIUS is active locally, route to nim escalation_model"

  Zuck:
    bias: balanced
    preference: local-first
    primary_model: ollama_local/qwen3.5:9b
    escalation_model: nim/nvidia/nemotron-3-super-120b-a12b

  Hermes:
    bias: balanced
    preference: local-first
    primary_model: ollama_local/qwen3.5:14b
    escalation_model: zai/glm-5
    fallback_model: nim/nvidia/nemotron-3-super-120b-a12b
